<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: #f3f2ef;
      color: rgba(0, 0, 0, 0.9);
    }

    /* Card container — like a LinkedIn feed card */
    .card {
      background: #fff;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #e0dfdc;
      overflow: hidden;
    }

    /* Header bar */
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #e0dfdc;
    }
    .header__title {
      font-size: 16px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.9);
    }
    .header__subtitle {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.6);
      margin-top: 2px;
    }

    /* Body */
    .body {
      padding: 16px;
    }
    .body p {
      font-size: 14px;
      line-height: 1.4;
      color: rgba(0, 0, 0, 0.6);
      margin-bottom: 16px;
    }

    /* Primary button — LinkedIn "Connect" style */
    .btn-primary {
      width: 100%;
      padding: 10px 16px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #004182; }
    .btn-primary:disabled {
      background: #0a66c2;
      opacity: 0.6;
      cursor: wait;
    }

    /* Secondary button — LinkedIn "Following" / outline style */
    .btn-secondary {
      width: 100%;
      padding: 10px 16px;
      background: transparent;
      color: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 0, 0, 0.6);
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-secondary:hover {
      background: rgba(0, 0, 0, 0.08);
      border-color: rgba(0, 0, 0, 0.9);
      color: rgba(0, 0, 0, 0.9);
    }

    /* Status badge */
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
    }
    .status:empty {
      display: none;
    }
    .status--ok {
      background: #e8f5e9;
      color: #1b5e20;
    }
    .status--err {
      background: #fce4ec;
      color: #b71c1c;
    }
    .status--loading {
      background: #e3f2fd;
      color: #0a66c2;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header__title">AI Content Detector</div>
      <div class="header__subtitle">Powered by Claude</div>
    </div>

    <div class="body">
      <!-- Logged out state -->
      <div id="logged-out">
        <p>Sign in with your Claude account to detect AI-generated posts in your feed.</p>
        <button class="btn-primary" id="login">Sign in with Claude</button>
      </div>

      <!-- Logged in state -->
      <div id="logged-in" class="hidden">
        <p>You're connected. Look for the "Check AI" button on posts in your feed.</p>
        <button class="btn-secondary" id="logout">Sign out</button>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
