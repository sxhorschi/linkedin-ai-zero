<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .info {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #login {
      background: #0a66c2;
      color: #fff;
    }
    #login:hover { background: #004182; }
    #logout {
      background: #f0f0f0;
      color: #333;
    }
    #logout:hover { background: #e0e0e0; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .status--ok { color: #388e3c; }
    .status--err { color: #d32f2f; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>🤖 LinkedIn AI Detector</h1>

  <div id="logged-out">
    <p class="info">Sign in with your Claude account (Pro/Max subscription) to detect AI-generated LinkedIn posts.</p>
    <button id="login">Sign in with Claude</button>
  </div>

  <div id="logged-in" class="hidden">
    <p class="info">You're signed in. Click "Check AI" on any LinkedIn post to analyze it.</p>
    <button id="logout">Sign out</button>
  </div>

  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
