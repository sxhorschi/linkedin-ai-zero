<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #0a66c2;
      box-shadow: 0 0 0 1px #0a66c2;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #004182; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .status--ok { color: #388e3c; }
    .status--err { color: #d32f2f; }
  </style>
</head>
<body>
  <h1>🤖 LinkedIn AI Detector</h1>
  <label for="apiKey">Anthropic API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
  <button id="save">Save Key</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
