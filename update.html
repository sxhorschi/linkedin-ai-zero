<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Update — AI Content Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f3f2ef;
      color: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e0dfdc;
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #e0dfdc;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; color: rgba(0,0,0,0.6); margin-top: 4px; }
    .body { padding: 24px; }
    .step {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .step__num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0a66c2;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step__num--done { background: #388e3c; }
    .step__text { font-size: 14px; line-height: 1.5; color: rgba(0,0,0,0.7); padding-top: 3px; }
    .step__text strong { color: rgba(0,0,0,0.9); }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }
    .btn:hover { background: #004182; }
    .btn:disabled { opacity: 0.6; cursor: wait; }
    .btn--secondary {
      background: transparent;
      color: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,0,0,0.6);
    }
    .btn--secondary:hover {
      background: rgba(0,0,0,0.08);
      color: rgba(0,0,0,0.9);
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .status--ok { background: #e8f5e9; color: #1b5e20; }
    .status--err { background: #fce4ec; color: #b71c1c; }
    .status--info { background: #e3f2fd; color: #0a66c2; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Update Available</h1>
      <p id="version-info"></p>
    </div>
    <div class="body">
      <div class="step">
        <div class="step__num" id="step1-num">1</div>
        <div class="step__text"><strong>Download update</strong> — fetches the latest files from GitHub.</div>
      </div>
      <div class="step">
        <div class="step__num">2</div>
        <div class="step__text"><strong>Save the ZIP</strong> — extract it into your extension folder, replacing the old files.</div>
      </div>
      <div class="step">
        <div class="step__num">3</div>
        <div class="step__text"><strong>Reload</strong> — go to <code>chrome://extensions</code> and click the reload button, or click below.</div>
      </div>

      <div class="actions">
        <button class="btn" id="download-btn">Download ZIP</button>
        <button class="btn btn--secondary" id="reload-btn">Reload Extension</button>
      </div>

      <div class="status hidden" id="status"></div>
    </div>
  </div>

  <script src="update.js"></script>
</body>
</html>
